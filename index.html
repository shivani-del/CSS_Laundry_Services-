<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundry Services - Expert Laundry & Dry Cleaning</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- The navbar uses flexbox for responsive layout -->
    <header>
        <nav class="navbar">
            <!-- Logo on the left side -->
            <div class="logo">Logo</div>
            
            <!-- Navigation links in the center -->
            <div class="nav-links">
                <a href="#home">Home</a>
                <a href="#services">Services</a>
                <a href="#about">About Us</a>
                <a href="#contact">Contact Us</a>
            </div>
            
            <!-- Username on the right side -->
             <div class="left-side">
                 <div class="username">Username</div>
                 
                 <!-- Hamburger menu button -->
                 <button class="hamburger-menu" tabindex="0" aria-label="Toggle mobile menu">
                     <span class="bar"></span>
                     <span class="bar"></span>
                     <span class="bar"></span>
                 </button>
                 <!-- Mobile menu as sibling element -->
                 <div class="mobile-menu">
                     <a href="#home">Home</a>
                     <a href="#services">Services</a>
                     <a href="#about">About Us</a>
                     <a href="#contact">Contact Us</a>
                 </div>
             </div>
        </nav>
    </header>

    <!-- Uses flexbox to create responsive two-column layout -->
    <main>
        <section class="hero">
            <div class="hero-left">
                <h1>Revitalize Your Clothes with Expert <span class="highlight">Laundry Services!</span></h1>
                <p>From premium dry cleaning to swift wash and fold, we deliver care and convenience. Schedule a pickup and rediscover the freshness of your clothes today!</p>
                <button class="cta-button">Book a service today!</button>
            </div>
            
            <div class="hero-right">
                <img src="https://aws-obg-image-lb-3.tcl.com/content/dam/iffalcon/product/wm/8kg-fully-auto-front-load/product/SideView_1.png" alt="Washing Machine and Laundry Services">
            </div>
            
            </section>
    </main>
</body>
</html>
